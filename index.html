<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech & Trend Studio</title>
    <style>
        :root {
            --primary-blue: #284b99;
            --accent-green: #08d962;
            --dark-bg: #0f0f0f;
            --sidebar-bg: #232f3e;
            --light-text: #f4f4f4;
            --payment-orange: #ff9900;
            --nav-bg: rgba(30, 30, 30, 0.95);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--light-text);
            margin: 0;
            overflow-x: hidden;
        }

        .blur-effect {
            filter: blur(8px);
        }

        /* --- Header --- */
        header {
            display: flex;
            align-items: center;
            height: 70px;
            background: var(--sidebar-bg);
            padding-left: 20px;
            border-bottom-right-radius: 40px; 
            border-bottom: 2px solid var(--primary-blue);
            width: fit-content;
            padding-right: 40px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .logo-box {
            background: white;
            padding: 5px;
            border-radius: 12px;
            display: flex;
            align-items: center;
        }

        .logo-box img { max-width: 45px; }

        header h1 {
            margin-left: 15px;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: white;
            margin-top: 0;
            margin-bottom: 0;
        }

        /* --- Barra di Navigazione Inferiore --- */
        .nav-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }

        .bottom-nav {
            background: var(--nav-bg);
            padding: 8px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid #444;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        .nav-pill {
            position: absolute;
            background: #f4f4f4;
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 0;
        }

        .nav-item {
            color: #999;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: color 0.3s ease;
            cursor: pointer;
            position: relative;
            z-index: 1;
        }

        .nav-item.active {
            color: #000;
        }

        .nav-divider { 
            width: 1px; 
            height: 25px; 
            background: #444; 
            margin: 0 5px; 
            z-index: 1;
        }

        /* --- Contenuto Principale --- */
        main {
            padding: 110px 20px 150px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-container {
            margin-bottom: 80px;
            scroll-margin-top: 120px;
        }

        .payment-banner {
            background: white;
            color: black;
            padding: 15px 25px;
            border-radius: 15px;
            font-weight: bold;
            border-left: 10px solid var(--payment-orange);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        /* --- Card Articoli --- */
        .article-card {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 30px;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .article-card.tech { border-top: 8px solid #00a8e8; }
        .article-card.trend { border-top: 8px solid #3adb76; }
        .article-card.faq { border-top: 8px solid var(--payment-orange); }

        .article-card h2 {
            font-size: 2rem;
            margin-top: 0;
            color: white;
            text-align: center;
        }

        .article-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .item {
            background: #2a2a2a;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #444;
        }

        .item h3 { margin-top: 0; color: var(--accent-green); }
        .item p { font-size: 0.9rem; color: #ccc; line-height: 1.5; }
        .item .price { font-weight: bold; color: white; margin-top: 10px; display: block; }

        /* --- Accordion FAQ --- */
        .faq-container { max-width: 850px; margin: 30px auto 0; }
        .faq-item { border-bottom: 1px solid #333; }
        .faq-question {
            width: 100%; background: none; border: none; color: white;
            text-align: left; padding: 20px; font-size: 1.1rem; font-weight: 600;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .faq-question:hover { background: rgba(255, 255, 255, 0.05); }
        .faq-question span { color: var(--accent-green); font-size: 1.5rem; transition: 0.3s; }
        .faq-answer { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; background: rgba(0,0,0,0.2); }
        .faq-answer p { padding: 0 20px 20px 20px; color: #ccc; margin: 0; line-height: 1.6; }
        .faq-item.active .faq-answer { max-height: 200px; }
        .faq-item.active .faq-question span { transform: rotate(45deg); color: #ff4d4d; }

        /* --- Footer --- */
        .site-footer {
            text-align: center;
            padding: 60px 20px 120px 20px;
            border-top: 1px solid #222;
        }

        .site-footer p {
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 1px;
            margin: 5px 0;
            text-transform: uppercase;
        }

        /* --- Overlay --- */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0); display: none; 
            justify-content: center; align-items: center; z-index: 2000;
            transition: background-color 0.4s ease;
        }
        .overlay.show { display: flex; background-color: rgba(0, 0, 0, 0.8); }
        .overlay-content {
            background: white; color: black; padding: 40px; border-radius: 20px;
            max-width: 500px; width: 90%; position: relative;
            border-left: 15px solid var(--payment-orange);
            transform: translateY(100vh); transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .overlay.show .overlay-content { transform: translateY(0); }
        .close-overlay { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="pageWrapper">
        <header>
            <div class="logo-box"><img src="logo.png" alt="Logo"></div>
            <h1>TECH TREND</h1>
        </header>

        <div class="nav-container">
            <nav class="bottom-nav" id="mainNav">
                <div class="nav-pill" id="navPill"></div>
                <a href="#" class="nav-item active" id="nav-home">Home</a>
                <div class="nav-divider"></div>
                <a href="#tech-section" class="nav-item" id="nav-tech">Tech Side</a>
                <a href="#trend-section" class="nav-item" id="nav-trend">Trend Side</a>
                <a href="#faq-section" class="nav-item" id="nav-faq">FAQ
